  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const INITIAL_PROMPTS = [

      "Wie zou het meest waarschijnlijk een powerbank meenemen naar een festival en hem zelf vergeten op te laden?",

      "Wie zou het meest waarschijnlijk huilen van het lachen om zijn/haar eigen grap?",
      "Wie zou het meest waarschijnlijk een pakketje bestellen en elke 10 minuten de track & trace checken?",

      "Wie zou het meest waarschijnlijk kaka doen in zijn/haar broek tijdens het uitgaan?",
      "Wie zou het meest waarschijnlijk een kleuter schoppen?",
      "Wie zou het meest waarschijnlijk z'n huisdier vermoorden voor 1 miljoen?",
      "Wie zou het meest waarschijnlijk kip eten die over datum is?",
      "Wie zou het meest waarschijnlijk een scheet laten en het op iemand anders steken?",
      "Wie zou het meest waarschijnlijk eerst sterven?",
      "Wie zou het meest waarschijnlijk plastische chirurgie laten doen?",
      "Wie zou het meest waarschijnlijk ontslag nemen zonder al een nieuwe job te hebben?",
      "Wie zou het meest waarschijnlijk toestemming moeten vragen aan z'n partner om te gamen?",
      "Wie zou het meest waarschijnlijk een serie bingen in 1 dag?",
      "Wie zou het meest waarschijnlijk een film starten en weer stoppen na een kwartier?",
      "Wie zou het meest waarschijnlijk blaffen tijdens de seks?",
      "Wie zou het meest waarschijnlijk van de aardbol verdwijnen na het winnen van de Lotto?",
      "Wie zou het meest waarschijnlijk zijn of haar partner bedriegen?",
      "Wie zou het meest waarschijnlijk een bak bier drinken in een dag?",
      "Wie zou het meest waarschijnlijk een Excel-sheet maken voor iets totaal onnodigs?"
    ];

    const PHASES = {
      SETUP:           "setup",
      QUESTION_TURN:   "question_turn",
      SHOW_QUESTION:   "show_question",
      WRITE:           "write",
      COUNTDOWN:       "countdown",
      SHOW_NAMES:      "show_names",
      REVEAL_QUESTION: "reveal_question",
      RESULT:          "result",
      VOTE:            "vote",
      SCOREBOARD:      "scoreboard",
    };

    const MAX_PLAYERS = 10; // ← Verander dit getal om het maximum aantal spelers aan te passen

    const PLAYER_COLORS = [
      "#e8c547","#52c98a","#e05252","#52b8e0",
      "#d452e0","#e08a52","#52e0c9","#9a7de8",
      "#e87d9a","#8ae06b","#f0a04b","#7db8e8",
    ];

    const DARK   = "#111111";
    const CARD   = "#1c1c1c";
    const BORDER = "#2a2a2a";
    const ACCENT = "#e8c547";
    const TEXT   = "#f0f0f0";
    const MUTED  = "#888888";
    const RED    = "#e05252";
    const GREEN  = "#52c98a";

    const css = `
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap');
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
      input, textarea { user-select: text; -webkit-user-select: text; }
      body { margin: 0; background: ${DARK}; overscroll-behavior-y: none; }
      .btn-active { transition: transform 0.1s ease, filter 0.2s ease; }
      .btn-active:active { transform: scale(0.96); filter: brightness(0.9); }
      .input-focus:focus { border-color: ${ACCENT} !important; outline: none; box-shadow: 0 0 0 2px ${ACCENT}44; }
      ::-webkit-scrollbar { width: 0px; background: transparent; }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.02;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        background-size: 180px 180px;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes startPulse {
        0%, 100% { box-shadow: 0 8px 32px ${ACCENT}40; }
        50%       { box-shadow: 0 8px 48px ${ACCENT}70; }
      }
      @keyframes badgePop {
        0%   { transform: scale(0.8); opacity: 0; }
        60%  { transform: scale(1.1); }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes countdownPop {
        0%   { transform: scale(1.6); opacity: 0; }
        55%  { opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes winnerPulse {
        0%, 100% { text-shadow: 0 0 0px ${GREEN}00; transform: scale(1); }
        50%       { text-shadow: 0 0 32px ${GREEN}bb; transform: scale(1.05); }
      }
      @keyframes confettiFall {
        0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
        100% { transform: translateY(130px) rotate(720deg); opacity: 0; }
      }
      @keyframes successSlideIn {
        0%   { opacity: 0; transform: translateY(-6px) scale(0.95); }
        60%  { transform: translateY(2px) scale(1.01); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
    `;

    const S = {
      page: {
        height: "100svh",
        background: DARK,
        fontFamily: "'Outfit', sans-serif",
        color: TEXT,
        display: "flex",
        flexDirection: "column",
        overflow: "hidden",
        animation: "fadeIn 0.2s ease-in-out",
      },
      inner: {
        flex: 1,
        display: "flex",
        flexDirection: "column",
        padding: "32px 24px 24px",
        maxWidth: "500px",
        width: "100%",
        margin: "0 auto",
        overflowY: "auto"
      },
      footer: {
        padding: "16px 24px calc(24px + env(safe-area-inset-bottom))",
        maxWidth: "500px",
        width: "100%",
        margin: "0 auto",
        background: DARK,
        borderTop: `1px solid ${BORDER}`
      },
      contentCenter: {
        flex: 1,
        display: "flex",
        flexDirection: "column",
        justifyContent: "center",
        paddingBottom: "40px",
      }
    };

    const Tag = ({ children, color = MUTED }) => (
      <span style={{ fontSize: 13, fontWeight: 800, letterSpacing: "0.12em", textTransform: "uppercase", color, display: "block", marginBottom: 12 }}>
        {children}
      </span>
    );

    const BigBtn = ({ onClick, children, bg = ACCENT, color = "#111", disabled = false, style = {} }) => (
      <button className={disabled ? "" : "btn-active"} onClick={onClick} disabled={disabled} style={{
        width: "100%",
        padding: "20px 24px",
        background: disabled ? BORDER : bg,
        color: disabled ? "#555" : color,
        border: "none",
        borderRadius: 20,
        fontSize: "clamp(18px, 5.4vw, 20px)",
        fontWeight: 800,
        fontFamily: "'Outfit', sans-serif",
        cursor: disabled ? "not-allowed" : "pointer",
        letterSpacing: "-0.01em",
        whiteSpace: "nowrap",
        boxShadow: disabled ? "none" : `0 8px 24px ${bg}25`,
        opacity: disabled ? 0.7 : 1,
        ...style
      }}>{children}</button>
    );

    const GhostBtn = ({ onClick, children, style = {} }) => (
      <button className="btn-active" onClick={onClick} style={{
        width: "100%",
        padding: "20px 24px",
        background: "transparent",
        color: MUTED,
        border: `2px solid ${BORDER}`,
        borderRadius: 20,
        fontSize: "clamp(16px, 4.8vw, 18px)",
        fontWeight: 700,
        fontFamily: "'Outfit', sans-serif",
        cursor: "pointer",
        whiteSpace: "nowrap",
        ...style
      }}>{children}</button>
    );

    const Card = ({ children, style = {} }) => (
      <div style={{ background: CARD, borderRadius: 20, border: `1px solid ${BORDER}`, padding: "24px", ...style }}>
        {children}
      </div>
    );

    const Divider = () => <div style={{ height: 2, background: BORDER, margin: "24px 0", borderRadius: 2 }} />;

    // ─── Custom Prompts Modal ──────────────────────────────────────────────────
    
    const MAX_QUESTION_LENGTH = 90;

    const PromptsModal = ({ customQuestions, onAdd, onDelete, onClose }) => {
      const [qText, setQText] = useState("");
      const [qError, setQError] = useState("");
      const [successMsg, setSuccessMsg] = useState("");

      const handleAdd = () => {
        if (qText.trim()) {
          let suffix = qText.trim();
          if (!suffix.endsWith('?')) suffix += '?';
          const fullQ = `Wie zou het meest waarschijnlijk ${suffix}`;
          
          if (fullQ.length > MAX_QUESTION_LENGTH) {
            setQError(`Te lang! Max. ${MAX_QUESTION_LENGTH} tekens.`);
            return;
          }
          
          const allQuestions = [...customQuestions, ...INITIAL_PROMPTS];
          const isDuplicate = allQuestions.some(q => q.toLowerCase() === fullQ.toLowerCase());
          if (isDuplicate) {
            setQError("Deze vraag is al toegevoegd.");
            return;
          }
          
          onAdd(fullQ);
          setQText("");
          setQError("");
          setSuccessMsg("✓ Vraag toegevoegd!");
          setTimeout(() => setSuccessMsg(""), 2200);
        }
      };

      return (
        <div style={{ 
          position: "fixed", 
          inset: 0, 
          background: "rgba(17,17,17,0.9)", 
          backdropFilter: "blur(12px)", 
          WebkitBackdropFilter: "blur(12px)",
          zIndex: 100, 
          display: "flex", 
          flexDirection: "column", 
          alignItems: "center",
          fontFamily: "'Outfit', sans-serif",
          animation: "fadeIn 0.2s ease-in-out",
        }}>
          <style>{css}</style>
          <div style={{ 
            width: "100%", 
            maxWidth: "500px", 
            height: "100%", 
            display: "flex", 
            flexDirection: "column", 
            padding: "24px 24px calc(24px + env(safe-area-inset-bottom))"
          }}>

            {/* ── Sticky top: titel + invoer + sectieheader ── */}
            <div style={{ flexShrink: 0 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 32 }}>
                <h2 style={{ fontSize: 24, fontWeight: 800, color: TEXT, letterSpacing: "-0.02em" }}>Prompts beheren</h2>
                <button 
                  onClick={onClose} 
                  className="btn-active"
                  style={{ 
                    background: "rgba(255,255,255,0.1)",
                    border: "none", 
                    color: TEXT, 
                    width: 40, 
                    height: 40, 
                    borderRadius: "50%", 
                    display: "flex", 
                    alignItems: "center", 
                    justifyContent: "center", 
                    fontSize: 24, 
                    fontWeight: 400,
                    cursor: "pointer"
                  }}
                >×</button>
              </div>

              <div style={{ marginBottom: 28 }}>
                <Tag color={ACCENT}>Voeg een vraag toe</Tag>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  <div style={{ fontSize: 16, color: TEXT, fontWeight: 600 }}>Wie zou het meest waarschijnlijk</div>
                  <div style={{ display: "flex", gap: 10 }}>
                    <input 
                      className="input-focus" 
                      placeholder="...dit spel winnen?" 
                      value={qText}
                      maxLength={MAX_QUESTION_LENGTH}
                      onChange={e => { 
                        const val = e.target.value;
                        const formatted = val.length > 0 ? val.charAt(0).toLowerCase() + val.slice(1) : val;
                        setQText(formatted); 
                        if (qError) setQError(""); 
                      }}
                      onKeyDown={e => e.key === "Enter" && qText.trim() !== "" && handleAdd()}
                      style={{ 
                        flex: 1, 
                        background: "#222", 
                        border: `2px solid ${BORDER}`, 
                        borderRadius: 12, 
                        padding: 14, 
                        color: TEXT, 
                        fontFamily: "inherit", 
                        fontSize: 16,
                        minWidth: 0 
                      }} 
                    />
                    <button 
                      className={qText.trim() === "" ? "" : "btn-active"}
                      onClick={handleAdd} 
                      disabled={qText.trim() === ""}
                      style={{ 
                        background: ACCENT, 
                        color: "#111", 
                        border: "none", 
                        borderRadius: 12, 
                        padding: "0 20px", 
                        fontWeight: 700, 
                        fontSize: 24,
                        cursor: qText.trim() === "" ? "default" : "pointer",
                        opacity: qText.trim() === "" ? 0.3 : 1,
                        filter: qText.trim() === "" ? "grayscale(0.5)" : "none",
                        transition: "all 0.3s ease"
                      }}
                    >+</button>
                  </div>
                  {qError && (
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 10, color: "#e07070", fontSize: 14, fontWeight: 600 }}>
                      <span>⚠️</span><span>{qError}</span>
                    </div>
                  )}
                  {successMsg && (
                    <div style={{
                      display: "flex", alignItems: "center", gap: 8, marginTop: 10,
                      color: GREEN, fontSize: 14, fontWeight: 700,
                      animation: "successSlideIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards",
                    }}>
                      <span>{successMsg}</span>
                    </div>
                  )}
                </div>
              </div>

              <span style={{ fontSize: 13, fontWeight: 800, letterSpacing: "0.12em", textTransform: "uppercase", color: MUTED, display: "block", marginBottom: 10 }}>
                Toegevoegde vragen {customQuestions.length > 0 && `(${customQuestions.length})`}
              </span>
            </div>

            {/* ── Scrollbare lijst ── */}
            <div style={{ flex: 1, overflowY: "auto" }}>
              {customQuestions.length === 0 ? (
                <div style={{ color: MUTED, fontSize: 16, textAlign: "center", marginTop: 20 }}>Nog geen eigen vragen toegevoegd.</div>
              ) : (
                customQuestions.slice().reverse().map((q, idx) => (
                  <div key={idx} style={{ padding: "16px 0", borderBottom: `1px solid ${BORDER}`, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
                    <div style={{ color: TEXT, fontSize: 16, fontWeight: 500, lineHeight: 1.4, flex: 1 }}>{q}</div>
                    <button onClick={() => onDelete(q)} className="btn-active" style={{ background: RED, color: "#fff", border: "none", borderRadius: "50%", width: 32, height: 32, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, fontWeight: 800, cursor: "pointer", flexShrink: 0 }}>
                      ×
                    </button>
                  </div>
                ))
              )}
            </div>

            {/* ── Klaar knop ── */}
            <div style={{ paddingTop: 16 }}>
              <BigBtn onClick={onClose}>Klaar</BigBtn>
            </div>

          </div>
        </div>
      );
    };

    // ─── Instructions Modal ────────────────────────────────────────────────────

    const InstructionsModal = ({ onClose }) => {
      const steps = [
        { emoji: "🎒", label: "Benodigdheden", text: "Eén smartphone voor de groep + papier en pen per speler (of iets anders om op te schrijven)." },
        { emoji: "📱", label: "Smartphone doorgeven", text: "Elke speler leest om de beurt discreet zijn vraag. De anderen kijken weg." },
        { emoji: "😈", label: "De imposter", text: "Eén speler is de imposter en krijgt een andere vraag. Hij of zij weet (nog) niet welke vraag de anderen hebben." },
        { emoji: "✍️", label: "Schrijf een naam op", text: "Iedereen schrijft discreet op wie bij zijn vraag past. Toon de naam nog niet!" },
        { emoji: "📝", label: "De echte vraag", text: "De originele vraag verschijnt nu voor iedereen. Lees ze luidop en bereid je voor om de namen te onthullen." },
        { emoji: "📢", label: "Toon aan de groep", text: "Na het aftellen toont iedereen welke naam hij of zij heeft opgeschreven." },
        { emoji: "🕵️", label: "Vind de imposter", text: "Overleg met de groep en bewijs je onschuld. Wijs allemaal tegelijk naar degene die jij denkt dat de imposter is." },
      ];

      return (
        <div style={{
          position: "fixed",
          inset: 0,
          background: "rgba(17,17,17,0.9)",
          backdropFilter: "blur(12px)",
          WebkitBackdropFilter: "blur(12px)",
          zIndex: 100,
          display: "flex",
          flexDirection: "column",
          alignItems: "center",
          fontFamily: "'Outfit', sans-serif",
          animation: "fadeIn 0.2s ease-in-out",
        }}>
          <style>{css}</style>
          <div style={{
            width: "100%",
            maxWidth: "500px",
            height: "100%",
            display: "flex",
            flexDirection: "column",
            padding: "24px 24px calc(24px + env(safe-area-inset-bottom))"
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 32 }}>
              <h2 style={{ fontSize: 24, fontWeight: 800, color: TEXT, letterSpacing: "-0.02em", margin: 0 }}>Hoe werkt het spel?</h2>
              <button
                onClick={onClose}
                className="btn-active"
                style={{
                  background: "rgba(255,255,255,0.1)",
                  border: "none",
                  color: TEXT,
                  width: 40,
                  height: 40,
                  borderRadius: "50%",
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  fontSize: 24,
                  fontWeight: 400,
                  cursor: "pointer",
                  flexShrink: 0,
                }}
              >×</button>
            </div>

            <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 0 }}>
              {steps.map((step, i) => (
                <div key={i} style={{
                  display: "flex",
                  gap: 20,
                  paddingBottom: 28,
                  position: "relative",
                }}>
                  <div style={{ display: "flex", flexDirection: "column", alignItems: "center", flexShrink: 0 }}>
                    <div style={{
                      width: 36,
                      height: 36,
                      borderRadius: "50%",
                      background: "#222",
                      border: `1px solid ${BORDER}`,
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      fontSize: 18,
                      flexShrink: 0,
                    }}>{step.emoji}</div>
                    {i < steps.length - 1 && (
                      <div style={{ width: 1, flex: 1, background: BORDER, marginTop: 8 }} />
                    )}
                  </div>
                  <div style={{ paddingTop: 6 }}>
                    <div style={{ fontSize: 17, fontWeight: 700, color: TEXT, marginBottom: 4 }}>{step.label}</div>
                    <div style={{ fontSize: 15, color: MUTED, lineHeight: 1.55, fontWeight: 500 }}>{step.text}</div>
                  </div>
                </div>
              ))}

              <div style={{ paddingTop: 24, borderTop: `1px solid ${BORDER}`, marginBottom: 20 }}>
                <div style={{ fontSize: 14, color: "#555", fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 8 }}>Punten</div>
                <div style={{ fontSize: 15, color: MUTED, lineHeight: 1.6, fontWeight: 500 }}>
                  Imposter gevonden → je wint <strong style={{color: TEXT}}>1 punt</strong>.<br/>
                  Niet gevonden → de imposter wint <strong style={{color: TEXT}}>2 punten</strong>.
                </div>
              </div>
            </div>

            <div style={{ paddingTop: 16 }}>
              <BigBtn onClick={onClose}>Duidelijk!</BigBtn>
            </div>
          </div>
        </div>
      );
    };

    // ─── Settings Modal ────────────────────────────────────────────────────────

    const Toggle = ({ enabled, onToggle }) => (
      <div
        className="btn-active"
        onClick={onToggle}
        style={{
          width: 52,
          height: 30,
          borderRadius: 100,
          background: enabled ? ACCENT : "#333",
          position: "relative",
          cursor: "pointer",
          flexShrink: 0,
          transition: "background 0.2s ease",
          border: "none",
        }}
      >
        <div style={{
          position: "absolute",
          top: 3,
          left: enabled ? 25 : 3,
          width: 24,
          height: 24,
          borderRadius: "50%",
          background: enabled ? "#111" : "#666",
          transition: "left 0.2s ease, background 0.2s ease",
        }} />
      </div>
    );

    const Stepper = ({ value, onChange, min, max, step = 1, format = v => v }) => (
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        <button
          className="btn-active"
          onClick={() => onChange(Math.max(min, value - step))}
          disabled={value <= min}
          style={{
            width: 36, height: 36, borderRadius: "50%",
            background: value <= min ? "#222" : "#2a2a2a",
            border: `1px solid ${BORDER}`,
            color: value <= min ? "#444" : TEXT,
            fontSize: 20, fontWeight: 700,
            cursor: value <= min ? "not-allowed" : "pointer",
            display: "flex", alignItems: "center", justifyContent: "center",
            flexShrink: 0,
          }}
        >−</button>
        <div style={{ fontSize: 18, fontWeight: 800, color: ACCENT, minWidth: 60, textAlign: "center" }}>
          {format(value)}
        </div>
        <button
          className="btn-active"
          onClick={() => onChange(Math.min(max, value + step))}
          disabled={value >= max}
          style={{
            width: 36, height: 36, borderRadius: "50%",
            background: value >= max ? "#222" : "#2a2a2a",
            border: `1px solid ${BORDER}`,
            color: value >= max ? "#444" : TEXT,
            fontSize: 20, fontWeight: 700,
            cursor: value >= max ? "not-allowed" : "pointer",
            display: "flex", alignItems: "center", justifyContent: "center",
            flexShrink: 0,
          }}
        >+</button>
      </div>
    );

    const APP_VERSION = "2.0.3";
    const LANGUAGES = [
      { code: "nl", label: "Nederlands"},
      { code: "en", label: "English"},
    ];

    const SettingsModal = ({ settings, onSave, onClose }) => {
      const [local, setLocal] = useState({ ...settings });

      const update = (key, val) => setLocal(prev => ({ ...prev, [key]: val }));

      return (
        <div style={{
          position: "fixed",
          inset: 0,
          background: "rgba(17,17,17,0.9)",
          backdropFilter: "blur(12px)",
          WebkitBackdropFilter: "blur(12px)",
          zIndex: 100,
          display: "flex",
          flexDirection: "column",
          alignItems: "center",
          fontFamily: "'Outfit', sans-serif",
          animation: "fadeIn 0.2s ease-in-out",
        }}>
          <style>{css}</style>
          <div style={{
            width: "100%",
            maxWidth: "500px",
            height: "100%",
            display: "flex",
            flexDirection: "column",
            padding: "24px 24px calc(24px + env(safe-area-inset-bottom))"
          }}>
            {/* Header */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 32 }}>
              <h2 style={{ fontSize: 24, fontWeight: 800, color: TEXT, letterSpacing: "-0.02em", margin: 0 }}>Instellingen</h2>
              <button
                onClick={onClose}
                className="btn-active"
                style={{
                  background: "rgba(255,255,255,0.1)",
                  border: "none",
                  color: TEXT,
                  width: 40,
                  height: 40,
                  borderRadius: "50%",
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  fontSize: 24,
                  fontWeight: 400,
                  cursor: "pointer",
                  flexShrink: 0,
                }}
              >×</button>
            </div>

            <div style={{ flex: 1, overflowY: "auto" }}>

              {/* Taal */}
              <div style={{ paddingBottom: 24, marginBottom: 4, borderBottom: `1px solid ${BORDER}` }}>
                <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 6 }}>
                  <span style={{ fontSize: 22, lineHeight: 1 }}>🌐</span>
                  <div>
                    <div style={{ fontSize: 17, fontWeight: 700, color: TEXT, marginBottom: 5 }}>Taal</div>
                    <div style={{ fontSize: 14, color: MUTED, fontWeight: 500 }}>Kies de taal van de app.</div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 10, paddingLeft: 36, marginTop: 14 }}>
                  {LANGUAGES.map(lang => (
                    <button
                      key={lang.code}
                      className="btn-active"
                      onClick={() => update("language", lang.code)}
                      style={{
                        flex: 1,
                        padding: "12px 10px",
                        borderRadius: 14,
                        border: `2px solid ${(local.language || "nl") === lang.code ? ACCENT : BORDER}`,
                        background: (local.language || "nl") === lang.code ? `${ACCENT}15` : "#1a1a1a",
                        color: (local.language || "nl") === lang.code ? ACCENT : MUTED,
                        fontFamily: "'Outfit', sans-serif",
                        fontSize: 14,
                        fontWeight: 700,
                        cursor: "pointer",
                        display: "flex",
                        alignItems: "center",
                        justifyContent: "center",
                        gap: 8,
                        transition: "all 0.15s ease",
                      }}
                    >
                      <span style={{ fontSize: 18 }}>{lang.flag}</span>
                      {lang.label}
                    </button>
                  ))}
                </div>
                <div style={{ fontSize: 12, color: "#555", fontWeight: 600, marginTop: 10, paddingLeft: 36 }}>
                  Meer talen volgen in een toekomstige update.
                </div>
              </div>

              {/* Over de app */}
              <div style={{ padding: "20px 0", borderBottom: `1px solid ${BORDER}` }}>
                <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 16 }}>
                  <span style={{ fontSize: 22, lineHeight: 1 }}>📱</span>
                  <div style={{ fontSize: 17, fontWeight: 700, color: TEXT }}>Over de app</div>
                </div>
                <div style={{ paddingLeft: 36, display: "flex", flexDirection: "column", gap: 12 }}>
                  {[
                    { label: "App naam", value: "Imposter — The Party Game" },
                    { label: "Versie", value: APP_VERSION },
                  ].map(item => (
                    <div key={item.label} style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span style={{ fontSize: 14, color: MUTED, fontWeight: 600 }}>{item.label}</span>
                      <span style={{ fontSize: 14, color: TEXT, fontWeight: 700 }}>{item.value}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Juridisch */}
              <div style={{ padding: "20px 0" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 14 }}>
                  <span style={{ fontSize: 22, lineHeight: 1 }}>📄</span>
                  <div style={{ fontSize: 17, fontWeight: 700, color: TEXT }}>Juridisch</div>
                </div>
                <div style={{ paddingLeft: 36, display: "flex", flexDirection: "column" }}>
                  {["Privacybeleid", "Gebruiksvoorwaarden"].map(item => (
                    <div key={item} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 0", borderBottom: `1px solid ${BORDER}` }}>
                      <span style={{ fontSize: 15, color: MUTED, fontWeight: 600 }}>{item}</span>
                      <span style={{ fontSize: 18, color: "#444" }}>›</span>
                    </div>
                  ))}
                </div>
                <div style={{ fontSize: 12, color: "#444", fontWeight: 600, marginTop: 12, paddingLeft: 36 }}>
                  Meer informatie volgt in een toekomstige update.
                </div>
              </div>

            </div>

            <div style={{ paddingTop: 16 }}>
              <BigBtn onClick={() => { onSave(local); onClose(); }}>Sluiten</BigBtn>
            </div>
          </div>
        </div>
      );
    };

    // ─── Screens ───────────────────────────────────────────────────────────────

    const SettingRow = ({ emoji, label, subtitle, settingKey, currentValue, noBorder, invertToggle, onToggle }) => {
      const isOn = invertToggle ? !currentValue : currentValue;
      const [showSubtitle, setShowSubtitle] = useState(isOn);
      const [animKey, setAnimKey] = useState(0);
      const prevIsOnRef = useRef(isOn);

      useEffect(() => {
        if (isOn && !prevIsOnRef.current) {
          setAnimKey(k => k + 1);
          setShowSubtitle(true);
        } else if (!isOn) {
          setShowSubtitle(false);
        }
        prevIsOnRef.current = isOn;
      }, [isOn]);

      return (
        <div style={{
          padding: "14px 0",
          borderBottom: noBorder ? "none" : `1px solid ${BORDER}`,
        }}>
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12 }}>
            <div style={{ display: "flex", alignItems: "flex-start", gap: 14, flex: 1 }}>
              <span style={{ fontSize: 22, flexShrink: 0, lineHeight: 1, marginTop: 2 }}>{emoji}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 16, fontWeight: 700, color: TEXT, lineHeight: 1.4 }}>{label}</div>
                {showSubtitle && subtitle && (
                  <div key={animKey} style={{
                    fontSize: 12, color: MUTED, fontWeight: 500, lineHeight: 1.4,
                    paddingTop: 5, paddingRight: 5,
                    animation: "fadeIn 0.2s ease",
                  }}>
                    {subtitle}
                  </div>
                )}
              </div>
            </div>
            <div style={{ marginTop: 2, flexShrink: 0 }}>
              <Toggle enabled={isOn} onToggle={onToggle} />
            </div>
          </div>
        </div>
      );
    };

    // SetupScreen heeft een eigen inputRef voor autofocus na toevoegen
    const SetupScreen = ({ players, newPlayer, setNewPlayer, addPlayer, removePlayer, startGame, onOpenPrompts, onOpenInstructions, onOpenSettings, questionError, playerError, setPlayerError, settings = {}, onUpdateSettings, playerColors = {} }) => {
      const inputRef = useRef(null);

      const handleAddPlayer = () => {
        addPlayer();
        setTimeout(() => inputRef.current && inputRef.current.focus(), 0);
      };

      const updateSetting = (key, val) => {
        if (onUpdateSettings) onUpdateSettings(key, val);
      };

      const canStart = players.length >= 3 && !questionError;

      return (
        <div style={S.page}>
          <style>{css}</style>
          <div style={{ ...S.inner, paddingTop: 32, gap: 0 }}>

            {/* ── Header / Logo ── */}
            <div style={{ textAlign: "center", marginBottom: 32 }}>
              <div style={{ fontSize: 12, fontWeight: 800, letterSpacing: "0.2em", color: ACCENT, textTransform: "uppercase", marginBottom: 10 }}>
                The party game
              </div>
              <div style={{ 
                fontSize: "clamp(42px, 16vw, 68px)", 
                fontWeight: 800, 
                lineHeight: 1, 
                textTransform: "uppercase", 
                letterSpacing: "-0.03em",
                position: "relative",
                display: "inline-block",
                whiteSpace: "nowrap",
              }}>
                <span>IMP</span>
                <span style={{ position: "relative", display: "inline-block" }}>
                  <span style={{ opacity: 0 }}>O</span>
                  <span style={{ 
                    position: "absolute", left: "52%", top: "50%",
                    transform: "translate(-50%, -50%)",
                    fontSize: "0.9em", lineHeight: 1, pointerEvents: "none"
                  }}>🤫</span>
                </span>
                <span>STER</span>
              </div>
              <div style={{ fontSize: 16, color: MUTED, marginTop: 10, fontWeight: 500 }}>
                Who's most likely to...
              </div>
            </div>

            {/* ── Action buttons: Instructies + Eigen vragen + Instellingen ── */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 14 }}>
              <button
                className="btn-active"
                onClick={onOpenInstructions}
                style={{
                  background: `${ACCENT}15`,
                  border: `1px solid ${ACCENT}35`,
                  borderRadius: 16,
                  padding: "8px 12px 10px 12px",
                  display: "flex", flexDirection: "column", alignItems: "center", gap: 6,
                  cursor: "pointer", fontFamily: "'Outfit', sans-serif",
                }}
              >
                <span style={{ fontSize: 20 }}>📖</span>
                <span style={{ fontSize: 11, fontWeight: 700, color: TEXT, lineHeight: 1.2, textAlign: "center", whiteSpace: "nowrap" }}>Spelregels</span>
              </button>
              <button
                className="btn-active"
                onClick={onOpenPrompts}
                style={{
                  background: `${ACCENT}15`,
                  border: `1px solid ${ACCENT}35`,
                  borderRadius: 16,
                  padding: "8px 12px 10px 12px",
                  display: "flex", flexDirection: "column", alignItems: "center", gap: 6,
                  cursor: "pointer", fontFamily: "'Outfit', sans-serif",
                  position: "relative",
                }}
              >
                {settings.customOnly && (
                  <span style={{
                    position: "absolute", top: -6, right: -6,
                    background: ACCENT, color: "#111",
                    borderRadius: 100, fontSize: 9, fontWeight: 800,
                    padding: "2px 7px", letterSpacing: "0.05em", textTransform: "uppercase",
                    animation: "badgePop 0.3s ease",
                  }}>Actief</span>
                )}
                <span style={{ fontSize: 20 }}>✏️</span>
                <span style={{ fontSize: 11, fontWeight: 700, color: TEXT, lineHeight: 1.2, textAlign: "center", whiteSpace: "nowrap" }}>Eigen vragen</span>
              </button>
              <button
                onClick={undefined}
                style={{
                  background: `${ACCENT}15`,
                  border: `1px solid ${ACCENT}35`,
                  borderRadius: 16,
                  padding: "8px 12px 10px 12px",
                  display: "flex", flexDirection: "column", alignItems: "center", gap: 6,
                  cursor: "not-allowed", fontFamily: "'Outfit', sans-serif",
                  opacity: 0.3,
                  pointerEvents: "none",
                }}
              >
                <span style={{ fontSize: 20 }}>⚙️</span>
                <span style={{ fontSize: 11, fontWeight: 700, color: TEXT, lineHeight: 1.2, textAlign: "center", whiteSpace: "nowrap" }}>Instellingen</span>
              </button>
            </div>

            {/* ── Spelers ── */}
            <Card style={{ marginBottom: 14 }}>
              <Tag>Spelers ({players.length}/{MAX_PLAYERS})</Tag>
              {players.length > 0 && (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 16 }}>
                  {players.map((p, i) => {
                    const color = playerColors[p] || ACCENT;
                    return (
                    <div key={p} className="btn-active" onClick={() => removePlayer(i)} style={{
                      display: "flex", alignItems: "center", gap: 6,
                      background: `${color}18`,
                      border: `1.5px solid ${color}55`,
                      borderRadius: 100, padding: "8px 14px 8px 12px", fontSize: 16, fontWeight: 700, cursor: "pointer",
                      color: color,
                    }}>
                      <span style={{
                        width: 10, height: 10, borderRadius: "50%",
                        background: color, flexShrink: 0,
                        boxShadow: `0 0 6px ${color}88`,
                      }} />
                      {p}
                      <div style={{ background: `${color}30`, color: color, borderRadius: "50%", width: 20, height: 20, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 800, paddingBottom: 1 }}>×</div>
                    </div>
                    );
                  })}
                </div>
              )}
              <div style={{ display: "flex", gap: 10 }}>
                <input
                  ref={inputRef}
                  className="input-focus"
                  value={newPlayer}
                  onChange={e => {
                    const val = e.target.value;
                    const formattedVal = val.charAt(0).toUpperCase() + val.slice(1);
                    setNewPlayer(formattedVal);
                    if (playerError) setPlayerError("");
                  }}
                  onKeyDown={e => e.key === "Enter" && newPlayer.trim() !== "" && players.length < MAX_PLAYERS && handleAddPlayer()}
                  placeholder={players.length >= MAX_PLAYERS ? "Max. spelers bereikt" : "Speler toevoegen…"}
                  disabled={players.length >= MAX_PLAYERS}
                  style={{
                    flex: 1, 
                    background: players.length >= MAX_PLAYERS ? "#1a1a1a" : "#222", 
                    border: `2px solid ${BORDER}`, 
                    borderRadius: 12,
                    padding: "13px", 
                    color: players.length >= MAX_PLAYERS ? "#444" : TEXT, 
                    fontSize: 17, 
                    minWidth: 0, 
                    fontWeight: 600, 
                    fontFamily: "'Outfit', sans-serif",
                    cursor: players.length >= MAX_PLAYERS ? "not-allowed" : "text",
                  }}
                />
                <button 
                  className={newPlayer.trim() === "" || players.length >= MAX_PLAYERS ? "" : "btn-active"} 
                  onClick={handleAddPlayer} 
                  disabled={newPlayer.trim() === "" || players.length >= MAX_PLAYERS}
                  style={{
                    background: ACCENT, color: "#111", border: "none", 
                    borderRadius: 12, padding: "0 18px", fontSize: 26, fontWeight: 700, 
                    cursor: newPlayer.trim() === "" || players.length >= MAX_PLAYERS ? "not-allowed" : "pointer", 
                    flexShrink: 0,
                    opacity: newPlayer.trim() === "" || players.length >= MAX_PLAYERS ? 0.3 : 1,
                    filter: newPlayer.trim() === "" || players.length >= MAX_PLAYERS ? "grayscale(0.5)" : "none",
                    transition: "all 0.3s ease"
                  }}
                >+</button>
              </div>
              {playerError && (
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 10, color: "#e07070", fontSize: 14, fontWeight: 600 }}>
                  <span>⚠️</span><span>{playerError}</span>
                </div>
              )}
              {!playerError && players.length === 3 && (
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 10, color: ACCENT, fontSize: 13, fontWeight: 600, opacity: 0.85 }}>
                  <span>💡</span><span>Tip: het spel is leuker met 4+ spelers!</span>
                </div>
              )}
            </Card>

            {/* ── Spelinstellingen ── */}
            <Card style={{ marginBottom: 0 }}>
              <Tag>Spelopties</Tag>
              
              <SettingRow emoji="🏆" label="Scorelimiet" subtitle="Het spel eindigt als iemand dit aantal punten haalt." currentValue={settings.targetEnabled} onToggle={() => updateSetting("targetEnabled", !settings.targetEnabled)} />
              {settings.targetEnabled && (
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 0 12px 40px", borderBottom: `1px solid ${BORDER}` }}>
                  <span style={{ fontSize: 13, fontWeight: 600, color: MUTED }}>Punten</span>
                  <Stepper value={settings.targetScore} onChange={v => updateSetting("targetScore", v)} min={3} max={30} step={1} format={v => `${v} pt`} />
                </div>
              )}

              <SettingRow emoji="⏱️" label="Discussietimer" subtitle="Zet de timer aan en bepaal hoe lang er overlegd mag worden." currentValue={settings.timerEnabled} onToggle={() => updateSetting("timerEnabled", !settings.timerEnabled)} />
              {settings.timerEnabled && (
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 0 12px 40px", borderBottom: `1px solid ${BORDER}` }}>
                  <span style={{ fontSize: 13, fontWeight: 600, color: MUTED }}>Tijdsduur</span>
                  <Stepper value={settings.timerSeconds} onChange={v => updateSetting("timerSeconds", v)} min={15} max={180} step={15} format={v => `${v}s`} />
                </div>
              )}

              <SettingRow emoji="📝" label="Enkel eigen vragen" subtitle="Schakel de standaardvragen uit en speel enkel met jouw zelf toegevoegde prompts." currentValue={settings.customOnly} onToggle={() => updateSetting("customOnly", !settings.customOnly)} />
              
              <SettingRow emoji="😈" label="Bewuste imposter" subtitle="De imposter weet meteen tijdens het lezen van de vraag dat hij/zij de imposter is." currentValue={settings.blindImposter} invertToggle noBorder onToggle={() => updateSetting("blindImposter", !settings.blindImposter)} />
            </Card>

            <div style={{ textAlign: "center", marginTop: 20, marginBottom: 0, lineHeight: 1.5 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#444", letterSpacing: "0.01em" }}>Imposter — The Party Game</div>
              <div style={{ fontSize: 10, fontWeight: 600, color: "#333", letterSpacing: "0.05em" }}>versie {APP_VERSION} (beta)</div>
            </div>

          </div>

          <div style={S.footer}>
            {questionError && (
              <div style={{
                background: "#2a1010", border: `1px solid #6a1a1a`,
                borderRadius: 20, padding: "14px 18px", marginBottom: 12,
                display: "flex", alignItems: "center", gap: 12,
              }}>
                <span style={{ fontSize: 20 }}>⚠️</span>
                <div style={{ fontSize: 15, fontWeight: 600, color: "#e07070", lineHeight: 1.4 }}>{questionError}</div>
              </div>
            )}
            <BigBtn
              onClick={startGame}
              disabled={!canStart}
              style={canStart ? { animation: "startPulse 2.5s ease-in-out infinite" } : {}}
            >
              {players.length < 3 ? `Nog ${3 - players.length} speler${3 - players.length !== 1 ? "s" : ""} nodig` : "🚀 Spel starten"}
            </BigBtn>
          </div>
        </div>
      );
    };

    const QuestionTurnScreen = ({ player, round, current, total, onShow, playerColor }) => (
      <div style={S.page}>
        <style>{css}</style>
        <div style={S.inner}>
          <div style={S.contentCenter}>
            <div style={{ fontSize: 14, color: MUTED, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 50 }}>
              Ronde {round} &nbsp;·&nbsp; {current}/{total}
            </div>
            <div style={{ fontSize: 80, marginBottom: 30 }}>👀</div>
            <div style={{ fontSize: "clamp(32px, 10.7vw, 40px)", fontWeight: 800, marginBottom: 16, letterSpacing: "-0.02em" }}>
              Hey <span style={{ color: playerColor || ACCENT }}>{player}</span>
            </div>
            <div style={{ fontSize: "clamp(17px, 5.4vw, 20px)", color: MUTED, lineHeight: 1.5, fontWeight: 500 }}>
              Pak de telefoon en lees jouw vraag.<br />De anderen kijken weg.
            </div>
          </div>
        </div>
        <div style={S.footer}>
          <BigBtn onClick={onShow}>Toon mijn vraag</BigBtn>
        </div>
      </div>
    );

    const ShowQuestionScreen = ({ isImposter, question, isLast, onDone, blindImposter }) => {
      // Als blinde imposter aan staat, ziet de imposter exact hetzelfde als een gewone speler
      const showAsImposter = isImposter && !blindImposter;
      return (
      <div style={{ ...S.page, background: showAsImposter ? "#1a0b0b" : DARK }}>
        <style>{css}</style>
        <div style={S.inner}>
          <div style={S.contentCenter}>
            {showAsImposter && (
              <div style={{
                display: "inline-block", background: "#3a1212", border: `2px solid #6a1a1a`,
                borderRadius: 100, padding: "8px 20px", fontSize: 14, fontWeight: 800,
                color: RED, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 30, alignSelf: "flex-start"
              }}>
              😈 Jij bent de imposter
              </div>
            )}
            <Tag color={showAsImposter ? RED : ACCENT}>Jouw vraag</Tag>

    const useCountdownSound = (countdown) => {
  const audioCtxRef = React.useRef(null);

  React.useEffect(() => {
    if (countdown < 0) return;

    // Maak AudioContext aan (of hergebruik)
    if (!audioCtxRef.current) {
      audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
    }
    const ctx = audioCtxRef.current;

    const playBeep = (frequency, duration, gain = 0.3) => {
      const oscillator = ctx.createOscillator();
      const gainNode = ctx.createGain();

      oscillator.connect(gainNode);
      gainNode.connect(ctx.destination);

      oscillator.type = "sine";
      oscillator.frequency.setValueAtTime(frequency, ctx.currentTime);

      gainNode.gain.setValueAtTime(gain, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

      oscillator.start(ctx.currentTime);
      oscillator.stop(ctx.currentTime + duration);
    };

    if (countdown > 0) {
      // Korte lage beep voor 3, 2, 1
      playBeep(440, 0.15, 0.3);
    } else {
      // Langere hoge "go!" toon
      playBeep(880, 0.12, 0.4);
      setTimeout(() => playBeep(1100, 0.3, 0.35), 120);
    }
  }, [countdown]);
};

      });
      const [showPrompts, setShowPrompts] = useState(false);
      const [showInstructions, setShowInstructions] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [showStopConfirm, setShowStopConfirm] = useState(false);
      const [settings, setSettings] = useState(() => {
        const defaults = { timerEnabled: false, timerSeconds: 60, targetEnabled: false, targetScore: 10, customOnly: false, blindImposter: true };
        try {
          const saved = JSON.parse(localStorage.getItem("imposter_settings"));
          return saved ? { ...defaults, ...saved } : defaults;
        } catch {
          return defaults;
        }
      });
      const [questionError, setQuestionError] = useState("");
      const [playerError, setPlayerError] = useState("");
      
      // Bereken proactief of er genoeg vragen zijn
      const activePool = settings.customOnly ? customQuestions : promptPool;
      const notEnoughQuestions = activePool.length < 2;
      const effectiveQuestionError = notEnoughQuestions 
        ? (settings.customOnly 
            ? "'Enkel eigen vragen' is actief. Voeg minstens 2 vragen toe via 'Eigen vragen' om een spel te starten."
            : "Niet genoeg vragen om te starten. Voeg minstens 2 eigen vragen toe.")
        : questionError;
      const countdownRef = useRef(null);

      // ── LocalStorage persistentie ──────────────────────────────────────────
      useEffect(() => {
        try { localStorage.setItem("imposter_custom_questions", JSON.stringify(customQuestions)); } catch {}
      }, [customQuestions]);

      useEffect(() => {
        try { localStorage.setItem("imposter_players", JSON.stringify(players)); } catch {}
      }, [players]);

      useEffect(() => {
        try { localStorage.setItem("imposter_scores", JSON.stringify(scores)); } catch {}
      }, [scores]);

      useEffect(() => {
        try { localStorage.setItem("imposter_player_colors", JSON.stringify(playerColors)); } catch {}
      }, [playerColors]);

      useEffect(() => {
        try { localStorage.setItem("imposter_available_prompts", JSON.stringify(availablePrompts)); } catch {}
      }, [availablePrompts]);

      useEffect(() => {
        try { localStorage.setItem("imposter_settings", JSON.stringify(settings)); } catch {}
        setQuestionError(""); // Reset fout als instellingen wijzigen
        // Reset de vragenpool als customOnly wijzigt zodat de pool altijd klopt
        setAvailablePrompts(settings.customOnly ? [...customQuestions] : [...promptPool]);
      }, [settings.customOnly]);

      useEffect(() => {
        try { localStorage.setItem("imposter_settings", JSON.stringify(settings)); } catch {}
      }, [settings]);

      // ── Spel starten ───────────────────────────────────────────────────────
      const startFreshGame = () => {
        const freshScores = {};
        players.forEach(p => { freshScores[p] = 0; });
        setScores(freshScores);
        setRound(0);
        setTimeout(() => startGame(players), 0);
      };

      const startGame = (p) => {
        // 1. Gebruik de bestaande spelers of de meegegeven lijst
        let pl = [...(p || players)]; 
        if (pl.length < 3) return;

        // Valideer vragen VOOR de ronde start (ook vanuit scorebord)
        const currentActivePool = settings.customOnly ? customQuestions : promptPool;
        if (currentActivePool.length < 2) {
          setQuestionError(
            settings.customOnly
              ? "'Enkel eigen vragen' actief. Voeg minstens 2 vragen toe."
              : "Niet genoeg vragen. Voeg minstens 2 eigen vragen toe."
          );
          setPhase(PHASES.SETUP);
          return;
        }
        setQuestionError("");

        // 2. Schud de spelerslijst in willekeurige volgorde voor deze ronde
        //    (setPlayers wordt NIET aangeroepen, zodat de setupvolgorde behouden blijft)
        pl = pl.sort(() => Math.random() - 0.5);
        setRoundPlayerOrder(pl);

        // De rest van je bestaande logica:
        setImposterIdx(Math.floor(Math.random() * pl.length));

        setAvailablePrompts(prev => {
          const activePool = settings.customOnly ? customQuestions : promptPool;
          if (activePool.length < 2) {
            setQuestionError("Niet genoeg vragen om te starten. Voeg minstens 2 eigen vragen toe.");
            return prev;
          }
          const pool = prev.filter(q => activePool.includes(q));
          const refilled = pool.length >= 2 ? pool : [...activePool];
          const shuffled = [...refilled].sort(() => 0.5 - Math.random());
          const nQ = shuffled[0];
          const iQ = shuffled[1];
          setCurrentNormalQ(nQ);
          setCurrentImposterQ(iQ);
          return shuffled.slice(2);
        });
        
        setCurrentPlayerIdx(0);
        setRound(r => r + 1);
        setPhase(PHASES.QUESTION_TURN);
      };

      const addCustomPrompt = (text) => {
        setCustomQuestions(prev => [...prev, text]);
        setPromptPool(prev => [...prev, text]);
        setAvailablePrompts(prev => [...prev, text]);
        setQuestionError(""); // Reset fout als er een vraag wordt toegevoegd
      };

      const removeCustomPrompt = (textToRemove) => {
        setCustomQuestions(prev => prev.filter(q => q !== textToRemove));
        setPromptPool(prev => prev.filter(q => q !== textToRemove));
        setAvailablePrompts(prev => prev.filter(q => q !== textToRemove));
      };

      const addPlayer = () => {
        const name = newPlayer.trim();
        if (!name) return;
        if (players.includes(name)) {
          setPlayerError(`"${name}" is al toegevoegd.`);
          return;
        }
        if (players.length < MAX_PLAYERS) {
          setPlayers(prev => [...prev, name]);
          setScores(prev => ({ ...prev, [name]: prev[name] || 0 }));
          // Altijd nieuwe willekeurige kleur (ook voor terugkerende spelers)
          setPlayerColors(prev => {
            const usedColors = Object.values(prev);
            const available = PLAYER_COLORS.filter(c => !usedColors.includes(c));
            const pool = available.length > 0 ? available : PLAYER_COLORS;
            const color = pool[Math.floor(Math.random() * pool.length)];
            return { ...prev, [name]: color };
          });
          setNewPlayer("");
          setPlayerError("");
        }
      };

      const removePlayer = (i) => {
        // Score wordt bewaard zodat een heringetreden speler met dezelfde naam zijn punten behoudt
        setPlayers(prev => prev.filter((_, idx) => idx !== i));
      };

      // ── Na het lezen: ga naar volgende speler of naar WRITE ──────────────
      const doneReading = () => {
        if (currentPlayerIdx + 1 < roundPlayerOrder.length) {
          setCurrentPlayerIdx(i => i + 1);
          setPhase(PHASES.QUESTION_TURN);
        } else {
          setPhase(PHASES.WRITE);
        }
      };

      const startCountdown = () => { setCountdown(3); setPhase(PHASES.COUNTDOWN); };

      useEffect(() => {
        if (phase !== PHASES.COUNTDOWN) return;
        countdownRef.current = setInterval(() => {
          setCountdown(c => {
            if (c <= 1) { clearInterval(countdownRef.current); setPhase(PHASES.SHOW_NAMES); return 0; }
            return c - 1;
          });
        }, 1000);
        return () => clearInterval(countdownRef.current);
      }, [phase]);

      const handleResult = (winnersOrFalse) => {
        const imposterName = roundPlayerOrder[imposterIdx];
        const imposterFound = winnersOrFalse !== false;
        setScores(prev => {
          const s = { ...prev };
          if (imposterFound) {
            winnersOrFalse.forEach(p => { s[p] = (s[p] || 0) + 1; });
          } else {
            s[imposterName] = (s[imposterName] || 0) + 2;
          }
          return s;
        });
        setPlayerStats(prev => {
          const s = { ...prev };
          if (!s[imposterName]) s[imposterName] = { timesImposter: 0, timesCaught: 0 };
          s[imposterName] = {
            ...s[imposterName],
            timesImposter: (s[imposterName].timesImposter || 0) + 1,
            timesCaught: (s[imposterName].timesCaught || 0) + (imposterFound ? 1 : 0),
          };
          if (imposterFound) {
            winnersOrFalse.forEach(p => {
              if (!s[p]) s[p] = { timesImposter: 0, timesCaught: 0, timesGuessed: 0 };
              s[p] = { ...s[p], timesGuessed: (s[p].timesGuessed || 0) + 1 };
            });
          }
          return s;
        });
        setPhase(PHASES.SCOREBOARD);
      };

      const resetGame = () => {
        setPhase(PHASES.SETUP); 
        setRound(0);
        const freshScores = {};
        players.forEach(p => { freshScores[p] = 0; });
        setScores(freshScores);
        setPlayerStats({});
        setImposterIdx(null);
        setAvailablePrompts([...promptPool]);
        try {
          localStorage.setItem("imposter_scores", JSON.stringify(freshScores));
          localStorage.removeItem("imposter_available_prompts");
        } catch {}
      };

      const stopGame = () => {
        resetGame();
      };

      const isInGame = phase !== PHASES.SETUP;

      return (
        <React.Fragment>
          {isInGame && (
            <button
              className="btn-active"
              onClick={() => setShowStopConfirm(true)}
              style={{
                position: "fixed",
                top: 24,
                right: "max(24px, calc((100vw - 500px) / 2 + 24px))",
                background: "rgba(255,255,255,0.1)",
                border: "none",
                color: TEXT,
                width: 40,
                height: 40,
                borderRadius: "50%",
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                fontSize: 24,
                fontWeight: 400,
                cursor: "pointer",
                flexShrink: 0,
                zIndex: 50,
              }}
            >×</button>
          )}
          {showStopConfirm && (
            <div style={{
              position: "fixed", inset: 0, zIndex: 200,
              background: "rgba(17,17,17,0.85)",
              backdropFilter: "blur(16px)", WebkitBackdropFilter: "blur(16px)",
              display: "flex", alignItems: "center", justifyContent: "center",
              padding: "24px",
              fontFamily: "'Outfit', sans-serif",
              animation: "fadeIn 0.15s ease-in-out",
            }}>
              <style>{css}</style>
              <div style={{
                background: CARD, border: `1px solid ${BORDER}`,
                borderRadius: 20, padding: "32px 28px",
                maxWidth: 360, width: "100%", textAlign: "center",
              }}>
                <div style={{ fontSize: 48, marginBottom: 16 }}>🚪</div>
                <div style={{ fontSize: 22, fontWeight: 800, color: TEXT, marginBottom: 10, letterSpacing: "-0.02em" }}>
                  Spel verlaten?
                </div>
                <div style={{ fontSize: 16, color: MUTED, fontWeight: 500, lineHeight: 1.55, marginBottom: 28 }}>
                  De huidige ronde gaat verloren en de scores worden gereset.
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  <BigBtn bg={RED} color="#fff" onClick={() => { setShowStopConfirm(false); stopGame(); }}>
                    Ja, stoppen
                  </BigBtn>
                  <GhostBtn onClick={() => setShowStopConfirm(false)}>
                    Terug naar spel
                  </GhostBtn>
                </div>
              </div>
            </div>
          )}
          {showInstructions && (
            <InstructionsModal onClose={() => setShowInstructions(false)} />
          )}
          {showPrompts && (
            <PromptsModal 
              customQuestions={customQuestions} 
              onAdd={addCustomPrompt} 
              onDelete={removeCustomPrompt}
              onClose={() => setShowPrompts(false)} 
            />
          )}
          {showSettings && (
            <SettingsModal
              settings={settings}
              onSave={setSettings}
              onClose={() => setShowSettings(false)}
            />
          )}
          
          {phase === PHASES.SETUP && (
            <SetupScreen players={players} newPlayer={newPlayer} setNewPlayer={setNewPlayer} addPlayer={addPlayer} removePlayer={removePlayer} startGame={() => startGame()} onOpenPrompts={() => setShowPrompts(true)} onOpenInstructions={() => setShowInstructions(true)} onOpenSettings={() => setShowSettings(true)} questionError={effectiveQuestionError} playerError={playerError} setPlayerError={setPlayerError} settings={settings} onUpdateSettings={(key, val) => setSettings(prev => ({ ...prev, [key]: val }))} playerColors={playerColors} />
          )}
          {phase === PHASES.QUESTION_TURN && (
            <QuestionTurnScreen player={roundPlayerOrder[currentPlayerIdx]} round={round} current={currentPlayerIdx + 1} total={roundPlayerOrder.length} onShow={() => setPhase(PHASES.SHOW_QUESTION)} playerColor={playerColors[roundPlayerOrder[currentPlayerIdx]]} />
          )}
          {phase === PHASES.SHOW_QUESTION && (
            <ShowQuestionScreen isImposter={currentPlayerIdx === imposterIdx} question={currentPlayerIdx === imposterIdx ? currentImposterQ : currentNormalQ} isLast={currentPlayerIdx + 1 === roundPlayerOrder.length} onDone={doneReading} blindImposter={settings.blindImposter} />
          )}
          {phase === PHASES.WRITE && (
            <WriteScreen onReady={() => setPhase(PHASES.REVEAL_QUESTION)} />
          )}
          {phase === PHASES.COUNTDOWN && (
            <CountdownScreen countdown={countdown} />
          )}
          {phase === PHASES.SHOW_NAMES && (
            <ShowNamesScreen onReveal={() => setPhase(PHASES.RESULT)} timerEnabled={settings.timerEnabled} timerSeconds={settings.timerSeconds} />
          )}
          {phase === PHASES.REVEAL_QUESTION && (
            <RevealQuestionScreen
              normalQuestion={currentNormalQ}
              onDone={() => startCountdown()}
            />
          )}
          {phase === PHASES.RESULT && (
            <ResultScreen imposterName={roundPlayerOrder[imposterIdx]} normalQ={currentNormalQ} imposterQ={currentImposterQ} onFound={() => setPhase(PHASES.VOTE)} onNotFound={() => handleResult(false)} playerColors={playerColors} />
          )}
          {phase === PHASES.VOTE && (
            <VoteScreen
              players={roundPlayerOrder}
              imposterName={roundPlayerOrder[imposterIdx]}
              onDone={(winners) => handleResult(winners)}
              playerColors={playerColors}
            />
          )}
          {phase === PHASES.SCOREBOARD && (
            <ScoreboardScreen
              players={players}
              scores={scores}
              round={round}
              onPlayAgain={() => startGame()}
              onNewGame={startFreshGame}
              onReset={resetGame}
              targetEnabled={settings.targetEnabled}
              targetScore={settings.targetScore}
              playerColors={playerColors}
              playerStats={playerStats}
            />
          )}
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ImposterGame />);
  </script>
</body>
</html>
